name: mm_cuda
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.10

  # CUDA-enabled PyTorch (12.1 build)
  - pytorch
  - torchvision
  - torchaudio
  - pytorch-cuda=12.1
  
  # Data & utilities
  - pandas=2.2.*
  - numpy
  - scikit-learn=1.3.2     # avoids new optional pyarrow import paths
  - fastparquet            # parquet engine without Arrow
  - tqdm
  - tifffile
  - pyyaml
  - timm
  - typer
  - matplotlib

  # Pip section
  - pip
  - pip:
      - albumentations
      - opencv-python-headless
      - wandb
      - schedulefree
      - transformers
