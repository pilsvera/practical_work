# Configuration for OpenPhenomMAE source_1 original experiments
# Usage: python -m masterthesis.visualization --config masterthesis/visualization/configs/openphenommae_source_1_original.yaml
#
# This configuration file contains checkpoint paths for OpenPhenomMAE source_1 experiments
# without data augmentation.
# Each experiment group contains 3 checkpoint runs for the corresponding split strategy.
#
# Split strategies:
#   - batch: Data split by experimental batch
#   - plate: Data split by plate IDs
#   - well: Data split by well positions
#   - random: Random data splitting
#
# Generated automatically from checkpoint scan on /home/vera/vsc5/data/AI/masterthesis

